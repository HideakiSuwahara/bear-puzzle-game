<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffb8d9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>くまぷよ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1 class="app-title"><span class="title-deco" aria-hidden="true">🎀</span> くまぷよ <span class="title-deco" aria-hidden="true">🐻</span></h1>

    <nav class="app-root-nav" aria-label="メインメニュー">
      <button type="button" class="root-tab" data-root="account">アカウント</button>
      <button type="button" class="root-tab" data-root="info">情報</button>
      <button type="button" class="root-tab is-active" data-root="play">プレイ</button>
    </nav>

    <p id="authMessage" class="auth-message" role="status"></p>

    <!-- アカウント（ログイン・新規登録） -->
    <div id="root-account" class="root-panel" aria-label="アカウント">
      <nav class="sub-nav" aria-label="アカウント内メニュー">
        <button type="button" class="sub-nav-btn" data-screen="login">ログイン</button>
        <button type="button" class="sub-nav-btn" data-screen="register">新規登録</button>
      </nav>
    <!-- ① 新規登録 -->
    <section id="screen-register" class="screen" aria-label="新規登録">
      <div class="auth-box auth-box-single">
        <h2>新規登録</h2>
        <input id="registerUserId" type="text" placeholder="ユーザーID（3文字以上）" autocomplete="username">
        <input id="registerPassword" type="password" placeholder="パスワード（4文字以上）" autocomplete="new-password">
        <button type="button" id="registerBtn">登録</button>
      </div>
    </section>

    <!-- ② ログイン・ログアウト -->
    <section id="screen-login" class="screen" aria-label="ログイン">
      <div class="auth-row">
        <div class="auth-box">
          <h2>ログイン</h2>
          <input id="loginUserId" type="text" placeholder="ユーザーID" autocomplete="username">
          <input id="loginPassword" type="password" placeholder="パスワード" autocomplete="current-password">
          <button type="button" id="loginBtn">ログイン</button>
        </div>
        <div class="auth-box">
          <h2>ログイン状態</h2>
          <p id="currentUserText">未ログイン</p>
          <button type="button" id="logoutBtn">ログアウト</button>
        </div>
      </div>
    </section>
    </div>

    <!-- 情報（ランキングなど） -->
    <div id="root-info" class="root-panel" aria-label="情報">
      <section id="screen-ranking" class="screen" aria-label="ランキング">
        <div class="ranking-panel">
          <div class="ranking-header">
            <h2>🏆 ランキング</h2>
            <button type="button" id="refreshRankingBtn" class="btn-secondary">再読み込み</button>
          </div>
          <ol id="rankingList">
            <li>メニューから開くと読み込みます</li>
          </ol>
        </div>
      </section>
    </div>

    <!-- プレイ -->
    <div id="root-play" class="root-panel is-active" aria-label="プレイ">
      <section id="screen-play" class="screen screen-play is-active" aria-label="ゲーム">
        <div class="game-area">
          <section class="game-info" aria-label="操作とヒント">
            <details class="play-hint-details">
              <summary class="play-hint-summary">遊び方・ヒント（タップで開く）</summary>
              <p class="play-hint">
                💕 ランキングにのせたいときは「アカウント」からログインしてからあそんでね<br />
                <span class="play-hint-sub">くまは 2 匹つながって落ちてきます（色はランダム）。左上に<strong>スコア・連鎖</strong>、右上に<strong>次の組</strong>。PC は<strong>矢印キー</strong>と<strong>↑</strong>で移動・回転。スマホは盤面の<strong>左右フリック</strong>で横移動、<strong>下フリック</strong>で速く落下、<strong>タップ</strong>で回転。中央の<strong>ゲームスタート</strong>から開始。固定後、足場のない方は下まで落ちます。盤面の<strong>薄ピンクの 2 行</strong>がデッドラインです。</span>
              </p>
            </details>
          </section>
          <div class="game-canvas-column">
            <section class="game-section game-section--framed">
              <div class="game-frame" aria-hidden="true"></div>
              <div class="game-canvas-wrap">
                <div class="canvas-hud" aria-live="polite" aria-label="スコア表示">
                  <div class="canvas-hud__line canvas-hud__line--score">
                    <span class="canvas-hud__label">スコア</span>
                    <span class="canvas-hud__value" id="score">0</span>
                  </div>
                  <div class="canvas-hud__line canvas-hud__line--chain">
                    <span class="canvas-hud__mini">連鎖 <span id="chain">0</span></span>
                  </div>
                </div>
                <div id="nextPiecePanel" class="next-piece-panel" aria-label="次に落ちてくる組">
                  <span class="next-piece-label">つぎ</span>
                  <canvas id="nextPreviewCanvas" width="56" height="84" class="next-preview-canvas" aria-hidden="true"></canvas>
                </div>
                <canvas id="gameCanvas" width="300" height="600" class="game-canvas"></canvas>
                <div id="chainFxLayer" class="chain-fx-layer" aria-hidden="true"></div>
                <div
                  id="touchGestureLayer"
                  class="touch-gesture-layer"
                  role="presentation"
                  aria-hidden="true"
                ></div>
              </div>
              <div id="playStartOverlay" class="play-start-overlay" aria-hidden="false">
                <button type="button" id="startBtn" class="btn-start-cute btn-start-cute--overlay">
                  ♪ ゲームスタート ♪
                </button>
                <p id="gameStartFlash" class="game-start-flash" hidden>ゲームスタート</p>
              </div>
            </section>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
